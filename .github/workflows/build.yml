name: Build and Push OCI Image

on:
  push:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/star122013/fedora-niri-atomic

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:raw
            ${{ env.IMAGE_NAME }}:raw-${{ github.sha }}

  rechunk:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman skopeo jq

      - name: Login to GHCR
        run: |
          echo '${{ secrets.GITHUB_TOKEN }}' | podman login ghcr.io -u '${{ github.actor }}' --password-stdin
          echo '${{ secrets.GITHUB_TOKEN }}' | skopeo login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Rechunk raw image
        env:
          RAW_REF: ${{ env.IMAGE_NAME }}:raw-${{ github.sha }}
          CHUNKED_REF: ${{ env.IMAGE_NAME }}:chunked-${{ github.sha }}
        run: |
          mkdir -p .chunkah
          podman pull "$RAW_REF"
          export CHUNKAH_CONFIG_STR="$(podman inspect "$RAW_REF")"
          podman run --rm \
            --mount=type=image,src="$RAW_REF",dst=/chunkah \
            -v "$PWD/.chunkah:/out:Z" \
            -e CHUNKAH_CONFIG_STR \
            quay.io/coreos/chunkah build \
            --max-layers 128 \
            -t "$CHUNKED_REF" \
            -o /out/out.ociarchive

      - name: Check bootc label
        run: |
          test "$(skopeo inspect oci-archive:.chunkah/out.ociarchive | jq -r '.Labels["containers.bootc"]')" = "1"

      - name: Push chunked image
        env:
          CHUNKED_SHA_REF: ${{ env.IMAGE_NAME }}:chunked-${{ github.sha }}
          CHUNKED_LATEST_REF: ${{ env.IMAGE_NAME }}:chunked
        run: |
          skopeo copy oci-archive:.chunkah/out.ociarchive docker://$CHUNKED_SHA_REF
          skopeo copy oci-archive:.chunkah/out.ociarchive docker://$CHUNKED_LATEST_REF
