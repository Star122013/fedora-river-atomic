# Create the Nix store directory in /var (writable, persistent across upgrades).
# /nix is a symlink to /var/nix baked into the image layer by the Containerfile,
# so bootc's read-only / is never an obstacle.
# The L+ line is kept as a safety net in case the symlink is ever lost.
d  /var/nix 0755 root root -
L+ /nix     -    -    -    - /var/nix
